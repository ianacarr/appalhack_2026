<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Camp Client</title>
    <style>
      body {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="appCanvas">
      <p id="statusText">Disconnected...</p>
      <div id="buttons">
        <button id="seedButton" class="mainButton"></button>
        <button id="downloadButton" class="mainButton"></button>
        <button id="settingsButton" class="mainButton"></button>
      </div>
      <div id="seedMenu" class="panel hidden">
        <label for="seedInput">Choose a file</label>
        <input type="file" id="seedInput" />
        <button id="seedSubmit">Seed</button>
      </div>
      <div id="downloadMenu" class="panel hidden">
        <label for="downloadInput">Enter a magnet link</label>
        <input type="text" id="downloadInput" />
        <button id="downloadSubmit">Download</button>
      </div>
      <div id="settingsMenu" class="panel hidden"></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
